<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taximoto - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Taximoto</h1>
        <a href="index.html" class="back-link">← Volver</a>
    </header>
    <main>
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="telefono">Teléfono (ej. 04125278450):</label>
                <input type="tel" id="telefono" name="telefono" required placeholder="04121234567">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>
        <div id="message" class="message"></div>
        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
</body>
</html>

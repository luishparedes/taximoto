<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TAXIMOTO - Iniciar sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase/config.js"></script>
    <script src="js/taximoto.js"></script> <!-- CAMBIO IMPORTANTE -->
</head>
<body>
    <div class="app-header">
        <h1>🚖 TAXIMOTO</h1>
        <p>Iniciar sesión</p>
        <button onclick="goHome()" class="btn btn-small btn-secondary" style="margin-top: 10px;">← Volver</button>
    </div>
    
    <div class="container">
        <div class="card">
            <form onsubmit="login(event)" id="login-form">
                <div class="form-group">
                    <label>📱 Teléfono</label>
                    <input type="tel" id="telefono" required 
                           placeholder="04121234567" 
                           inputmode="numeric"
                           pattern="[0-9]{10,}"
                           title="Mínimo 10 dígitos">
                </div>
                
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <div class="password-container">
                        <input type="password" id="password" required 
                               placeholder="Ingresa tu contraseña"
                               minlength="6">
                        <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                    </div>
                </div>
                
                <div class="terms-checkbox">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">Recordar mi teléfono</label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large">Ingresar</button>
            </form>
            
            <p style="text-align: center; margin: 20px 0;">
                ¿No tienes cuenta? 
                <a href="register.html" style="color: var(--accent-green); font-weight: 600;">Regístrate</a>
            </p>
            
            <p style="text-align: center;">
                <a href="#" style="color: var(--text-gray); text-decoration: none; font-size: 0.9rem;" 
                   onclick="alert('Contacta al administrador para restablecer tu contraseña:\n📞 04125278450')">
                    ¿Olvidaste tu contraseña?
                </a>
            </p>
        </div>
        
        <div class="legal-notice">
            TAXIMOTO solo conecta conductores con usuarios. No se hace responsable por pagos, accidentes, daños o conflictos.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedPhone = localStorage.getItem('taximoto_phone');
            if (savedPhone) {
                document.getElementById('telefono').value = savedPhone;
            }
        });

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>

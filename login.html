<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taximoto - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
        <p>Cargando Taximoto...</p>
    </div>

    <div id="app" class="app-container" style="display: none;">
        <header class="main-header">
            <h1 class="logo">🚖 Taximoto</h1>
            <p class="slogan">Iniciar Sesión</p>
        </header>

        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="index.html">Inicio</a></li>
                <li class="nav-item active"><a href="login.html">Iniciar Sesión</a></li>
                <li class="nav-item"><a href="register.html">Registrarse</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="form-container">
                <h2>Accede a Taximoto</h2>
                
                <div id="error-message" style="color: #ff8888; display: none; padding: 10px; background: #442222; border-radius: 8px; margin-bottom: 15px;"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;">Iniciar Sesión</button>
                </form>
                
                <p style="text-align:center; margin-top:20px;">
                    ¿No tienes cuenta? <a href="register.html" style="color:#ff6b00;">Regístrate</a>
                </p>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 Taximoto</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('error-message').textContent = 'Completa todos los campos';
                return;
            }
            
            // Por ahora solo simulamos login exitoso
            alert('Demo: Login exitoso (modo pruebas)');
            window.location.href = 'request.html';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Taximoto - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
        <p>Cargando Taximoto...</p>
    </div>

    <div id="app" class="app-container" style="display: none;">
        <header class="main-header">
            <div class="logo-container">
                <h1 class="logo">🚖 Taximoto</h1>
                <p class="slogan">Inicia sesión en tu cuenta</p>
            </div>
        </header>

        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="index.html">Inicio</a></li>
                <li class="nav-item active"><a href="login.html">Iniciar Sesión</a></li>
                <li class="nav-item"><a href="register.html">Registrarse</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="form-container">
                <h2 style="margin-bottom:20px;">Accede a Taximoto</h2>
                
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom:20px;">
                        <label><input type="checkbox" name="remember"> Recordarme</label>
                        <a href="#" style="color:#ff6b00;">¿Olvidaste tu contraseña?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width:100%;">Iniciar Sesión</button>
                </form>
                
                <p style="text-align:center; margin-top:20px;">
                    ¿No tienes cuenta? <a href="register.html" style="color:#ff6b00;">Regístrate aquí</a>
                </p>
            </div>
            
            <section class="legal-notice">
                <h4>⚠️ Aviso Legal</h4>
                <p>Al iniciar sesión aceptas nuestros términos y condiciones.</p>
            </section>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 Taximoto</p>
        </footer>
    </div>

    <script type="module">
        import { iniciarSesion, getSesionActual } from './js/auth.js'
        
        const loginForm = document.getElementById('login-form')
        const emailInput = document.getElementById('email')
        const passwordInput = document.getElementById('password')
        const errorMsg = document.getElementById('error-message')
        const successMsg = document.getElementById('success-message')
        
        function mostrarError(mensaje) {
            errorMsg.textContent = mensaje
            errorMsg.classList.add('show')
            successMsg.classList.remove('show')
        }
        
        function mostrarExito(mensaje) {
            successMsg.textContent = mensaje
            successMsg.classList.add('show')
            errorMsg.classList.remove('show')
        }
        
        // Verificar sesión existente
        (async function() {
            const sesion = await getSesionActual()
            if (sesion) {
                mostrarExito('Sesión activa. Redirigiendo...')
                setTimeout(() => {
                    window.location.href = sesion.user.role === 'admin' ? 'admin/dashboard.html' : 'request.html'
                }, 1500)
            }
        })()
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault()
            
            const email = emailInput.value.trim()
            const password = passwordInput.value
            
            if (!email || !password) {
                mostrarError('Completa todos los campos')
                return
            }
            
            mostrarExito('Iniciando sesión...')
            
            try {
                const resultado = await iniciarSesion(email, password)
                
                if (resultado.success) {
                    mostrarExito('¡Login exitoso! Redirigiendo...')
                    setTimeout(() => {
                        window.location.href = resultado.role === 'admin' ? 'admin/dashboard.html' : 'request.html'
                    }, 1500)
                } else {
                    mostrarError(resultado.error || 'Error al iniciar sesión')
                }
            } catch (error) {
                mostrarError('Error de conexión')
            }
        })
    </script>
</body>
</html>

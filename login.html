<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAXIMOTO - Iniciar sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <div class="app-header">
        <h1>🚖 TAXIMOTO</h1>
        <p>Iniciar sesión</p>
    </div>
    
    <div class="container">
        <div class="card">
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" required placeholder="04121234567">
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                ¿No tienes cuenta? <a href="register.html" style="color: var(--accent-green);">Regístrate</a>
            </p>
        </div>
        
        <div class="legal-notice">
            TAXIMOTO solo conecta conductores con usuarios. No se hace responsable por pagos, accidentes, daños o conflictos.
        </div>
    </div>
</body>
</html>

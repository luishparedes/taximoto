<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor - TaxiMoto2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .notification-sound { display: none; }
        .solicitud-card.nueva {
            animation: highlight 1s ease;
            border-left: 5px solid #ff4444;
        }
        @keyframes highlight {
            0% { background-color: #fff3cd; }
            100% { background-color: white; }
        }
        .estado-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .estado-enviada { background-color: #ffc107; color: #000; }
        .estado-aceptada { background-color: #17a2b8; color: #fff; }
        .estado-camino { background-color: #007bff; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="logo">Panel Conductor</h2>
        <button class="btn-back" onclick="window.location.href='index.html'">← Inicio</button>
        <button id="logoutBtnConductor" class="btn btn-secondary" style="margin-bottom:20px;">Cerrar sesión</button>

        <audio id="notificationSound" preload="auto">
            <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
        </audio>

        <div id="conductorInfo" style="margin-bottom:20px; padding:15px; background:#f0f0f0; border-radius:30px;">
            Cargando...
        </div>

        <h3>📋 Solicitudes disponibles</h3>
        <div id="solicitudesDisponibles">Cargando...</div>

        <h3>🚗 Mis servicios activos</h3>
        <div id="misServicios">Cargando...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = getSupabase();
            const notificationSound = document.getElementById('notificationSound');
            
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Obtener perfil del conductor
            const { data: profile } = await supabase
                .from('profiles')
                .select('tipo, estado, nombre, apellido, email, telefono')
                .eq('id', user.id)
                .single();

            if (!profile || profile.estado !== 'activo' || !['taxi', 'mototaxi'].includes(profile.tipo)) {
                alert('Acceso denegado');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('conductorInfo').innerHTML = `
                <strong>👤 ${profile.nombre || ''} ${profile.apellido || ''}</strong><br>
                <span>📧 ${profile.email}</span><br>
                <span>📱 ${profile.telefono || 'No registrado'}</span><br>
                <span>🚖 Tipo: ${profile.tipo}</span>
            `;

            function playSound() {
                notificationSound.play().catch(() => {});
            }

            async function getUsuarios(ids) {
                if (!ids.length) return {};
                const { data } = await supabase
                    .from('profiles')
                    .select('id, nombre, apellido, telefono')
                    .in('id', ids);
                const map = {};
                (data || []).forEach(u => map[u.id] = u);
                return map;
            }

            async function loadAvailableRequests() {
                let query = supabase
                    .from('solicitudes')
                    .select('*')
                    .eq('estado', 'enviada');
                
                if (profile.tipo === 'taxi') {
                    query = query.eq('tipo_servicio', 'taxi');
                } else {
                    query = query.in('tipo_servicio', ['mototaxi', 'delivery']);
                }

                const { data } = await query.order('created_at', { ascending: false });
                if (!data) return;

                const userIds = data.map(s => s.usuario_id);
                const usuariosMap = await getUsuarios(userIds);

                const container = document.getElementById('solicitudesDisponibles');
                container.innerHTML = '';
                
                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#666;">No hay solicitudes</p>';
                    return;
                }

                data.forEach(s => {
                    const u = usuariosMap[s.usuario_id] || { nombre: 'Usuario', telefono: 'N/A' };
                    card = document.createElement('div');
                    card.className = 'solicitud-card nueva';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <div>
                                <strong>👤 ${u.nombre || ''} ${u.apellido || ''}</strong><br>
                                <span>📱 ${u.telefono || 'N/A'}</span>
                            </div>
                            <span class="estado-badge estado-enviada">NUEVA</span>
                        </div>
                        <hr>
                        <p><strong>📍 Origen:</strong> ${s.origen}</p>
                        <p><strong>🏁 Destino:</strong> ${s.destino}</p>
                        <p><strong>🛵 Tipo:</strong> ${s.tipo_servicio}</p>
                        <button class="btn btn-primary aceptar" data-id="${s.id}" style="width:100%;">✅ Aceptar</button>
                    `;
                    container.appendChild(card);
                });

                document.querySelectorAll('.aceptar').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        const solicitud = data.find(s => s.id == id);
                        
                        e.target.disabled = true;
                        e.target.textContent = 'Procesando...';

                        const { error } = await supabase
                            .from('solicitudes')
                            .update({ 
                                estado: 'aceptada', 
                                conductor_id: user.id, 
                                accepted_at: new Date() 
                            })
                            .eq('id', id)
                            .eq('estado', 'enviada');

                        if (!error) {
                            await supabase
                                .from('notificaciones')
                                .insert({
                                    user_id: solicitud.usuario_id,
                                    mensaje: `✅ Tu solicitud fue aceptada por ${profile.nombre || 'un conductor'}.`
                                });
                            loadAvailableRequests();
                            loadActiveServices();
                        } else {
                            alert('Error: ' + error.message);
                            e.target.disabled = false;
                            e.target.textContent = '✅ Aceptar';
                        }
                    });
                });
            }

            async function loadActiveServices() {
                const { data } = await supabase
                    .from('solicitudes')
                    .select('*')
                    .eq('conductor_id', user.id)
                    .in('estado', ['aceptada', 'conductor_en_camino'])
                    .order('created_at', { ascending: false });

                const container = document.getElementById('misServicios');
                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#666;">Sin servicios activos</p>';
                    return;
                }

                const userIds = data.map(s => s.usuario_id);
                const usuariosMap = await getUsuarios(userIds);

                data.forEach(s => {
                    const u = usuariosMap[s.usuario_id] || { nombre: 'Usuario' };
                    const card = document.createElement('div');
                    card.className = 'solicitud-card';
                    let botones = '';
                    if (s.estado === 'aceptada') {
                        botones = `<button class="btn btn-secondary iniciar" data-id="${s.id}">🚦 Iniciar viaje</button>`;
                    } else if (s.estado === 'conductor_en_camino') {
                        botones = `<button class="btn btn-secondary finalizar" data-id="${s.id}">🏁 Finalizar</button>`;
                    }
                    card.innerHTML = `
                        <div><strong>👤 ${u.nombre || ''} ${u.apellido || ''}</strong><br>📱 ${u.telefono || 'N/A'}</div>
                        <p>📍 ${s.origen} → 🏁 ${s.destino}</p>
                        <p>Estado: <span class="estado-badge estado-${s.estado}">${s.estado}</span></p>
                        ${botones}
                    `;
                    container.appendChild(card);
                });

                document.querySelectorAll('.iniciar').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        await supabase
                            .from('solicitudes')
                            .update({ estado: 'conductor_en_camino' })
                            .eq('id', id);
                        loadActiveServices();
                    });
                });

                document.querySelectorAll('.finalizar').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        const s = data.find(s => s.id == id);
                        await supabase
                            .from('solicitudes')
                            .update({ estado: 'finalizada', finished_at: new Date() })
                            .eq('id', id);
                        await supabase
                            .from('servicios')
                            .insert({
                                solicitud_id: id,
                                usuario_id: s.usuario_id,
                                conductor_id: user.id,
                                tipo_servicio: s.tipo_servicio,
                                origen: s.origen,
                                destino: s.destino,
                                created_at: s.created_at,
                                finished_at: new Date()
                            });
                        loadActiveServices();
                        loadAvailableRequests();
                    });
                });
            }

            // Suscripciones en tiempo real
            supabase
                .channel('solicitudes_conductor')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'solicitudes',
                    filter: profile.tipo === 'taxi' ? 'tipo_servicio=eq.taxi' : 'tipo_servicio=in.(mototaxi,delivery)'
                }, () => {
                    playSound();
                    loadAvailableRequests();
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'solicitudes',
                    filter: `conductor_id=eq.${user.id}`
                }, () => loadActiveServices())
                .subscribe();

            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }

            await loadAvailableRequests();
            await loadActiveServices();

            document.getElementById('logoutBtnConductor').addEventListener('click', async () => {
                await supabase.auth.signOut();
                localStorage.removeItem('taximoto_email');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>

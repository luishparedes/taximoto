<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TaxiMoto2026</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #39FF14;
            color: black;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .btn-activar {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
        }
        .btn-desactivar {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
        }
        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filtros button {
            flex: 1;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="logo">Panel Administrador</h2>
        <button class="btn-back" onclick="window.location.href='../index.html'">← Inicio</button>
        <button id="logoutBtnAdmin" class="btn btn-secondary" style="margin-bottom:20px;">Cerrar sesión</button>

        <div class="filtros">
            <button class="btn btn-primary" id="verUsuarios">👥 Todos los usuarios</button>
            <button class="btn btn-primary" id="verConductores">🚖 Conductores</button>
            <button class="btn btn-primary" id="verSolicitudes">📋 Solicitudes</button>
            <button class="btn btn-primary" id="verInactivos">⏳ Inactivos</button>
        </div>
        
        <div id="adminContent"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/taximoto.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = getSupabase();
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            // Verificar que es admin por teléfono
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('telefono, nombre, email')
                .eq('id', user.id)
                .single();

            if (profileError || profile.telefono !== '04125278450') {
                alert('Acceso denegado - Solo administradores');
                window.location.href = '../index.html';
                return;
            }

            // Mostrar información del admin
            const adminInfo = document.createElement('div');
            adminInfo.className = 'conductor-info';
            adminInfo.style.marginBottom = '20px';
            adminInfo.innerHTML = `
                <strong>👤 Admin: ${profile.nombre || 'Administrador'}</strong><br>
                <span>📧 ${profile.email}</span><br>
                <span>📱 ${profile.telefono}</span>
            `;
            document.querySelector('.container').insertBefore(adminInfo, document.getElementById('adminContent'));

            // Función para cargar usuarios
            async function loadUsuarios(filtro = 'todos') {
                let query = supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (filtro === 'conductores') {
                    query = query.in('tipo', ['taxi', 'mototaxi']);
                } else if (filtro === 'inactivos') {
                    query = query.eq('estado', 'inactivo');
                }

                const { data, error } = await query;
                if (error) alert(error.message);
                else renderUsuarios(data);
            }

            function renderUsuarios(usuarios) {
                let html = '<h3>👥 Usuarios</h3>';
                html += '<table>';
                html += '<tr><th>Email</th><th>Nombre</th><th>Teléfono</th><th>Tipo</th><th>Estado</th><th>Acción</th></tr>';
                
                usuarios.forEach(u => {
                    html += `<tr>
                        <td>${u.email}</td>
                        <td>${u.nombre} ${u.apellido}</td>
                        <td>${u.telefono || '—'}</td>
                        <td>${u.tipo}</td>
                        <td>${u.estado}</td>
                        <td>
                            <button class="${u.estado === 'inactivo' ? 'btn-activar' : 'btn-desactivar'}" 
                                    data-id="${u.id}" 
                                    data-estado="${u.estado}">
                                ${u.estado === 'inactivo' ? 'Activar' : 'Desactivar'}
                            </button>
                        </td>
                    </tr>`;
                });
                
                html += '</table>';
                document.getElementById('adminContent').innerHTML = html;

                // Event listeners para botones activar/desactivar
                document.querySelectorAll('button[data-id]').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        const nuevoEstado = e.target.dataset.estado === 'inactivo' ? 'activo' : 'inactivo';
                        
                        const { error } = await supabase
                            .from('profiles')
                            .update({ estado: nuevoEstado })
                            .eq('id', id);
                            
                        if (error) {
                            alert('Error: ' + error.message);
                        } else {
                            // Recargar la misma vista
                            if (document.querySelector('.filtros .btn-primary.active')) {
                                const filtroActivo = document.querySelector('.filtros .btn-primary.active').id;
                                if (filtroActivo === 'verConductores') loadUsuarios('conductores');
                                else if (filtroActivo === 'verInactivos') loadUsuarios('inactivos');
                                else loadUsuarios('todos');
                            } else {
                                loadUsuarios('todos');
                            }
                        }
                    });
                });
            }

            // Ver solicitudes (corregido el error de relación)
async function loadSolicitudes() {
    const { data, error } = await supabase
        .from('solicitudes')
        .select(`
            id,
            tipo_servicio,
            origen,
            destino,
            estado,
            created_at,
            usuario:usuario_id (
                nombre,
                apellido,
                telefono,
                email
            ),
            conductor:conductor_id (
                nombre,
                apellido,
                telefono,
                email
            )
        `)
        .order('created_at', { ascending: false });

                if (error) {
                    alert('Error al cargar solicitudes: ' + error.message);
                    console.error(error);
                    return;
                }

                let html = '<h3>📋 Solicitudes</h3>';
                html += '<table>';
                html += '<tr><th>ID</th><th>Usuario</th><th>Teléfono</th><th>Tipo</th><th>Origen</th><th>Destino</th><th>Estado</th><th>Conductor</th><th>Fecha</th></tr>';
                
                data.forEach(s => {
                    const usuario = s.usuario || { email: 'Desconocido', nombre: '', apellido: '', telefono: '' };
                    const conductor = s.conductor || { email: '—', nombre: '', apellido: '' };
                    
                    html += `<tr>
                        <td>${s.id}</td>
                        <td>${usuario.nombre} ${usuario.apellido}<br><small>${usuario.email}</small></td>
                        <td>${usuario.telefono || '—'}</td>
                        <td>${s.tipo_servicio}</td>
                        <td>${s.origen}</td>
                        <td>${s.destino}</td>
                        <td>${s.estado}</td>
                        <td>${conductor.nombre} ${conductor.apellido}<br><small>${conductor.email}</small></td>
                        <td>${new Date(s.created_at).toLocaleString()}</td>
                    </tr>`;
                });
                
                html += '</table>';
                document.getElementById('adminContent').innerHTML = html;
            }

            // Event listeners para filtros
            document.getElementById('verUsuarios').addEventListener('click', () => {
                document.querySelectorAll('.filtros .btn-primary').forEach(btn => btn.classList.remove('active'));
                document.getElementById('verUsuarios').classList.add('active');
                loadUsuarios('todos');
            });

            document.getElementById('verConductores').addEventListener('click', () => {
                document.querySelectorAll('.filtros .btn-primary').forEach(btn => btn.classList.remove('active'));
                document.getElementById('verConductores').classList.add('active');
                loadUsuarios('conductores');
            });

            document.getElementById('verInactivos').addEventListener('click', () => {
                document.querySelectorAll('.filtros .btn-primary').forEach(btn => btn.classList.remove('active'));
                document.getElementById('verInactivos').classList.add('active');
                loadUsuarios('inactivos');
            });

            document.getElementById('verSolicitudes').addEventListener('click', () => {
                document.querySelectorAll('.filtros .btn-primary').forEach(btn => btn.classList.remove('active'));
                document.getElementById('verSolicitudes').classList.add('active');
                loadSolicitudes();
            });

            // Cargar usuarios por defecto
            loadUsuarios('todos');

            // Logout
            document.getElementById('logoutBtnAdmin').addEventListener('click', async () => {
                await supabase.auth.signOut();
                localStorage.removeItem('taximoto_email');
                window.location.href = '../index.html';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taximoto - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Taximoto</h1>
        <a href="index.html" class="back-link">← Volver</a>
    </header>
    <main>
        <h2>Registro</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono (ej. 04125278450):</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>
            <div class="form-group">
                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" required>
            </div>
            <div class="form-group">
                <label for="tipo">Tipo de cuenta:</label>
                <select id="tipo" name="tipo" required>
                    <option value="usuario">Usuario</option>
                    <option value="conductor_taxi">Conductor Taxi</option>
                    <option value="conductor_mototaxi">Conductor Mototaxi</option>
                    <option value="comercio">Comercio</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="acepto" required>
                    Acepto el <a href="#" onclick="alert('La plataforma Taximoto solo conecta usuarios con conductores de la comunidad. No nos hacemos responsables por daños, pérdidas o conflictos derivados del servicio.'); return false;">aviso de responsabilidad</a>.
                </label>
            </div>
            <button type="submit" class="btn">Registrarse</button>
        </form>
        <div id="message" class="message"></div>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
</body>
</html>

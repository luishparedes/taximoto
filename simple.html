<!DOCTYPE html>
<html>
<head>
    <title>TAXIMOTO FUNCIONAL</title>
</head>
<body>
    <h1>Registro Funcional</h1>
    
    <input type="text" id="nombre" placeholder="Nombre completo"><br>
    <input type="text" id="telefono" placeholder="Teléfono"><br>
    <input type="text" id="cedula" placeholder="Cédula"><br>
    <input type="password" id="password" placeholder="Contraseña"><br>
    <button onclick="registrar()">Registrarme</button>
    
    <div id="resultado" style="margin-top:20px; padding:10px; border:1px solid #ccc;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // CONFIGURACIÓN
        const SUPABASE_URL = 'https://kamcozmlzgvixaopsiqk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_HJkELm1PKc9hTB7R8DsRng_a2qqkv8z';
        
        // Crear cliente (NOTA: es "supabase.createClient", NO "supabaseJs")
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function registrar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const cedula = document.getElementById('cedula').value;
            const password = document.getElementById('password').value;
            
            const resultado = document.getElementById('resultado');
            
            // Validaciones básicas
            if (!nombre || !telefono || !cedula || !password) {
                resultado.innerHTML = '❌ Todos los campos son obligatorios';
                return;
            }
            
            if (password.length < 6) {
                resultado.innerHTML = '❌ La contraseña debe tener al menos 6 caracteres';
                return;
            }
            
            resultado.innerHTML = '⏳ Registrando...';
            
            try {
                // PASO 1: Crear usuario en Authentication
                const email = telefono + '@taximoto.com';
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                resultado.innerHTML = '✅ Usuario creado en Auth. Guardando perfil...';
                
                // PASO 2: Guardar perfil en la tabla 'usuarios'
                const { error: dbError } = await supabase
                    .from('usuarios')
                    .insert({
                        auth_id: authData.user.id,
                        nombre: nombre,
                        telefono: telefono,
                        cedula: cedula,
                        rol: 'usuario',
                        activo: true
                    });
                
                if (dbError) throw dbError;
                
                resultado.innerHTML = '✅ ¡REGISTRO EXITOSO!<br>Ya puedes iniciar sesión.';
                
            } catch (error) {
                console.error('Error completo:', error);
                resultado.innerHTML = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>

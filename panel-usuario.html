<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - TaxiMoto2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* --- estilos existentes --- */
        .estado-badge { display: inline-block; padding:5px 10px; border-radius:20px; font-size:0.8rem; font-weight:bold; }
        .estado-enviada { background-color:#ffc107; color:#000; }
        .estado-aceptada { background-color:#17a2b8; color:#fff; }
        .estado-camino { background-color:#007bff; color:#fff; }
        .estado-finalizada { background-color:#28a745; color:#fff; }
        .estado-cancelada { background-color:#dc3545; color:#fff; }
        .btn-cancelar { background-color:#dc3545; color:white; border:none; padding:10px; border-radius:30px; width:100%; margin-top:10px; cursor:pointer; }
        .btn-cancelar:hover { background-color:#c82333; }
        .conductor-info { background-color:#e8f5e9; padding:15px; border-radius:15px; margin-top:10px; border-left:5px solid #39FF14; }
        /* --- botones favoritos y calificación --- */
        .btn-favorito { background-color:#ff9800; color:white; border:none; padding:5px 10px; border-radius:20px; cursor:pointer; margin-left:5px; }
        .btn-favorito.agregado { background-color:#4caf50; }
        .estrellas { display:flex; gap:5px; margin-top:5px; }
        .estrella { cursor:pointer; font-size:1.2rem; color:#ccc; }
        .estrella.seleccionada { color:#ffc107; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="logo">Mi Panel</h2>
    <button class="btn-back" onclick="window.location.href='index.html'">← Inicio</button>
    <button id="logoutBtnPanel" class="btn btn-secondary" style="margin-bottom:20px;">Cerrar sesión</button>

    <div class="service-buttons">
        <button class="btn-service" data-service="taxi">🚖 Pedir Taxi</button>
        <button class="btn-service" data-service="mototaxi">🛵 Pedir Mototaxi</button>
        <button class="btn-service" data-service="delivery">📦 Delivery</button>
    </div>

    <h3>📋 Mis solicitudes activas</h3>
    <div id="misSolicitudes">Cargando...</div>

    <h3>📜 Historial reciente</h3>
    <div id="historial">Cargando...</div>

    <div id="notificaciones" style="position: fixed; top:10px; right:10px; z-index:1000;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/taximoto.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const supabase = getSupabase();
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) window.location.href = 'login.html';

    // --- Estado de usuario ---
    const { data: profile } = await supabase
        .from('profiles')
        .select('estado, tipo, nombre')
        .eq('id', user.id)
        .single();
    if (profile.estado !== 'activo') { alert('Cuenta inactiva'); window.location.href='index.html'; }

    // --- Botones servicio ---
    document.querySelectorAll('.btn-service').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const service = e.target.dataset.service;
            window.location.href = `request.html?tipo=${service}`;
        });
    });

    function showNotification(message, type='info') {
        const notif = document.createElement('div');
        notif.style.cssText = `
            background:${type==='success'?'#d4edda':'#fff3cd'};
            color:${type==='success'?'#155724':'#856404'};
            padding:15px; border-radius:30px; margin-bottom:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
            border-left:5px solid ${type==='success'?'#39FF14':'#ffc107'};
        `;
        notif.textContent = message;
        document.getElementById('notificaciones').appendChild(notif);
        setTimeout(()=>notif.remove(),5000);
    }

    // --- Cargar solicitudes ---
    async function loadSolicitudes() {
        const { data: solicitudes } = await supabase
            .from('solicitudes')
            .select('*')
            .eq('usuario_id', user.id)
            .in('estado',['enviada','aceptada','conductor_en_camino'])
            .order('created_at',{ascending:false});

        const conductorIds = solicitudes.filter(s=>s.conductor_id).map(s=>s.conductor_id);
        let conductores=[];
        if(conductorIds.length>0){
            const { data: condData } = await supabase
                .from('profiles')
                .select('id, nombre, apellido, telefono')
                .in('id', conductorIds);
            conductores = condData || [];
        }

        const solicitudesCompletas = solicitudes.map(s=>({...s, conductor: conductores.find(c=>c.id===s.conductor_id)||null}));
        renderSolicitudes(solicitudesCompletas);
    }

    function renderSolicitudes(solicitudes) {
        const container = document.getElementById('misSolicitudes');
        container.innerHTML = '';
        if(solicitudes.length===0){ container.innerHTML='<p style="text-align:center;color:#666;">No tienes solicitudes activas.</p>'; return; }

        solicitudes.forEach(s=>{
            const card=document.createElement('div');
            card.className='solicitud-card';
            let estadoTexto='', estadoClase='', infoConductor='', botonCancelar='';
            switch(s.estado){
                case 'enviada': estadoTexto='Buscando conductor...'; estadoClase='estado-enviada'; botonCancelar=`<button class="btn-cancelar" data-id="${s.id}">❌ Cancelar solicitud</button>`; break;
                case 'aceptada': estadoTexto='Conductor asignado'; estadoClase='estado-aceptada'; break;
                case 'conductor_en_camino': estadoTexto='🚦 Conductor en camino'; estadoClase='estado-camino'; break;
            }

            // Info conductor + botones favoritos y calificación si aplica
            if(s.conductor){
                infoConductor = `
                    <div class="conductor-info">
                        <strong>👤 Conductor:</strong> ${s.conductor.nombre} ${s.conductor.apellido}<br>
                        <strong>📱 Teléfono:</strong> ${s.conductor.telefono || 'No disponible'}<br>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <a href="tel:${s.conductor.telefono}" class="btn btn-primary" style="flex:1;padding:10px;">📞 Llamar</a>
                            <a href="https://wa.me/${s.conductor.telefono?.replace(/\D/g,'')}" class="btn btn-secondary" style="flex:1;padding:10px;">💬 WhatsApp</a>
                            <button class="btn-favorito" data-conductor="${s.conductor.id}">⭐</button>
                        </div>
                        <div class="estrellas" data-servicio="${s.id}"></div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div><strong>📍 ${s.origen} → 🏁 ${s.destino}</strong></div>
                    <span class="estado-badge ${estadoClase}">${s.estado}</span>
                </div>
                <p><strong>Tipo:</strong> ${s.tipo_servicio}</p>
                <p><strong>Estado:</strong> ${estadoTexto}</p>
                ${infoConductor}
                ${botonCancelar}
            `;
            container.appendChild(card);
        });

        // Cancelar solicitudes
        document.querySelectorAll('.btn-cancelar').forEach(btn=>{
            btn.addEventListener('click', async (e)=>{
                if(!confirm('¿Cancelar esta solicitud?')) return;
                const id=e.target.dataset.id;
                const { error } = await supabase.from('solicitudes').update({estado:'cancelada'}).eq('id',id).eq('usuario_id',user.id).eq('estado','enviada');
                if(error){ alert('Error al cancelar: '+error.message); } else { showNotification('Solicitud cancelada','success'); loadSolicitudes(); }
            });
        });

        // Agregar favoritos
        document.querySelectorAll('.btn-favorito').forEach(btn=>{
            btn.addEventListener('click', async (e)=>{
                const conductor_id = e.target.dataset.conductor;
                const { error } = await supabase.from('favoritos').upsert({usuario_id:user.id, conductor_id});
                if(error){ showNotification('Error: '+error.message); } else {
                    e.target.classList.add('agregado');
                    showNotification('Conductor agregado a favoritos','success');
                }
            });
        });

        // Calificaciones
        document.querySelectorAll('.estrellas').forEach(async div=>{
            const servicio_id = div.dataset.servicio;
            // cargar calificación previa si existe
            const { data: calif } = await supabase.from('calificaciones').select('puntuacion').eq('servicio_id', servicio_id).eq('usuario_id', user.id).single();
            const puntuacion = calif?.puntuacion || 0;
            for(let i=1;i<=5;i++){
                const star = document.createElement('span');
                star.className='estrella'+(i<=puntuacion?' seleccionada':'');
                star.innerHTML='&#9733;';
                star.dataset.valor=i;
                star.addEventListener('click', async ()=>{
                    await supabase.from('calificaciones').upsert({servicio_id, usuario_id:user.id, conductor_id:div.previousElementSibling.querySelector('.btn-favorito').dataset.conductor, puntuacion:i});
                    div.querySelectorAll('.estrella').forEach(s=>s.classList.remove('seleccionada'));
                    star.classList.add('seleccionada');
                    showNotification('Calificación registrada','success');
                });
                div.appendChild(star);
            }
        });
    }

    // --- Cargar historial ---
    async function loadHistorial() {
        const { data } = await supabase.from('servicios').select('*').eq('usuario_id', user.id).order('finished_at',{ascending:false}).limit(5);
        const container=document.getElementById('historial');
        container.innerHTML='';
        if(!data || data.length===0){ container.innerHTML='<p style="text-align:center;color:#666;">Sin viajes anteriores</p>'; return; }
        data.forEach(s=>{
            container.innerHTML+=`
                <div class="solicitud-card" style="background:#f9f9f9;">
                    <p><strong>${s.origen} → ${s.destino}</strong></p>
                    <p>Tipo: ${s.tipo_servicio} | ${new Date(s.finished_at).toLocaleDateString()}</p>
                </div>
            `;
        });
    }

    // --- Suscripciones Realtime ---
    supabase.channel('usuario_channel')
        .on('postgres_changes', { event:'*', schema:'public', table:'solicitudes', filter:`usuario_id=eq.${user.id}`}, ()=>loadSolicitudes())
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'notificaciones', filter:`user_id=eq.${user.id}`}, payload=>showNotification(payload.new.mensaje,'info'))
        .subscribe();

    await loadSolicitudes();
    await loadHistorial();

    // --- Logout ---
    document.getElementById('logoutBtnPanel').addEventListener('click', async ()=>{ await supabase.auth.signOut(); localStorage.removeItem('taximoto_email'); window.location.href='index.html'; });
});
</script>
</body>
</html>

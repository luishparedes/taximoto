<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taximoto - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
        <p>Cargando Taximoto...</p>
    </div>

    <div id="app" class="app-container" style="display: none;">
        <header class="main-header">
            <div class="logo-container">
                <h1 class="logo">🚖 Taximoto</h1>
                <p class="slogan">Transporte comunitario</p>
            </div>
        </header>

        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item active"><a href="index.html">Inicio</a></li>
                <li class="nav-item"><a href="login.html">Iniciar Sesión</a></li>
                <li class="nav-item"><a href="register.html">Registrarse</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="cards-container">
                <div class="card">
                    <div class="card-icon">🚗</div>
                    <h3>Solicitar Viaje</h3>
                    <p>¿Necesitas un motorizado o taxi?</p>
                    <a href="request.html" class="btn btn-primary">Solicitar Ahora</a>
                </div>
                <div class="card">
                    <div class="card-icon">🏍️</div>
                    <h3>Ser Conductor</h3>
                    <p>Regístrate y comienza a ganar</p>
                    <a href="register.html" class="btn btn-secondary">Registrarme</a>
                </div>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 Taximoto</p>
        </footer>
    </div>

    <script>
        // Ocultar pantalla de carga
        setTimeout(function() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }, 1000);
    </script>
</body>
</html>

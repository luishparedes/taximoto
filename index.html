<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxiMoto2026</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">TaxiMoto<span>2026</span></h1>
        
        <!-- Botones de autenticación (visibles solo si no hay sesión) -->
        <div id="authButtons" class="btn-group">
            <a href="register.html" class="btn btn-primary">Registro</a>
            <a href="login.html" class="btn btn-secondary">Inicio de sesión</a>
        </div>

        <!-- Botones de servicio (siempre visibles, pero redirigen según sesión) -->
        <div class="service-buttons">
            <button class="btn-service" data-service="taxi">🚖 Pedir Taxi</button>
            <button class="btn-service" data-service="mototaxi">🛵 Pedir Mototaxi</button>
            <button class="btn-service" data-service="delivery">📦 Delivery</button>
        </div>

        <!-- Botón de cierre de sesión (visible solo si hay sesión) -->
        <div id="logoutContainer" style="display:none; margin-top:20px;">
            <button id="logoutBtn" class="btn btn-secondary">Cerrar sesión</button>
        </div>

        <!-- Botón Volver (solo en páginas internas, aquí no aplica, pero lo dejamos para consistencia) -->
        
        <div class="legal">
            <p>TaxiMoto2026 conecta usuarios con conductores de la comunidad.</p>
            <p><strong>TaxiMoto2026 NO se hace responsable por daños, caídas o conflictos derivados del servicio.</strong></p>
            <p>Los pagos se realizan directamente entre usuario y conductor. La plataforma no procesa pagos.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Mostrar/ocultar botones según sesión
            const { user } = await getSupabase().auth.getUser();
            if (user) {
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('logoutContainer').style.display = 'block';
            } else {
                document.getElementById('authButtons').style.display = 'flex';
                document.getElementById('logoutContainer').style.display = 'none';
            }

            // Botones de servicio
            document.querySelectorAll('.btn-service').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const service = e.target.dataset.service;
                    const { data: { user } } = await getSupabase().auth.getUser();
                    if (user) {
                        // Verificar si el usuario está activo
                        const { data: profile } = await getSupabase()
                            .from('profiles')
                            .select('estado, tipo')
                            .eq('id', user.id)
                            .single();
                        if (profile.estado !== 'activo') {
                            alert('Tu cuenta está inactiva. Contacta al administrador.');
                            return;
                        }
                        // Si es usuario normal, puede pedir; si es conductor, redirigir a su panel
                        if (profile.tipo === 'usuario' || profile.tipo === 'comercio') {
                            window.location.href = `request.html?tipo=${service}`;
                        } else {
                            window.location.href = 'conductor-dashboard.html';
                        }
                    } else {
                        window.location.href = 'login.html';
                    }
                });
            });

            // Logout
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await getSupabase().auth.signOut();
                localStorage.removeItem('taximoto_email');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>

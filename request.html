<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Servicio - TaxiMoto2026</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2 class="logo">Solicitar Servicio</h2>
        <button class="btn-back" onclick="window.history.back()">← Volver</button>

        <form id="requestForm">
            <input type="hidden" id="tipoServicio" value="">
            <div class="form-group">
                <label for="origen">Origen</label>
                <input type="text" id="origen" required>
            </div>
            <div class="form-group">
                <label for="destino">Destino</label>
                <input type="text" id="destino" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Enviar Solicitud</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tipo = urlParams.get('tipo');
        if (tipo) document.getElementById('tipoServicio').value = tipo;

        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const supabase = getSupabase();
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            const tipoServicio = document.getElementById('tipoServicio').value;

            const { error } = await supabase
                .from('solicitudes')
                .insert({
                    usuario_id: user.id,
                    tipo_servicio: tipoServicio,
                    origen,
                    destino,
                    estado: 'enviada'
                });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Solicitud enviada');
                window.location.href = 'panel-usuario.html';
            }
        });
    </script>
</body>
</html>

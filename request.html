<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taximoto - Solicitar Servicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Taximoto</h1>
        <button id="logout" class="btn-logout">Cerrar sesión</button>
    </header>
    <main>
        <h2>Solicitar servicio</h2>
        <form id="request-form">
            <div class="form-group">
                <label for="tipo_servicio">Tipo de servicio:</label>
                <select id="tipo_servicio" required>
                    <option value="taxi">Taxi</option>
                    <option value="mototaxi">Mototaxi</option>
                    <option value="delivery">Delivery</option>
                </select>
            </div>
            <div class="form-group">
                <label for="origen">Origen:</label>
                <input type="text" id="origen" required placeholder="Dirección de recogida">
            </div>
            <div class="form-group">
                <label for="destino">Destino:</label>
                <input type="text" id="destino" required placeholder="Dirección de destino">
            </div>
            <button type="submit" class="btn">Solicitar</button>
        </form>

        <hr>

        <h3>Mis solicitudes activas</h3>
        <div id="solicitudes-activas"></div>

        <h3>Historial</h3>
        <div id="historial"></div>
    </main>

    <!-- Modal para calificar -->
    <div id="modal-calificar" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Calificar servicio</h3>
            <form id="calificar-form">
                <input type="hidden" id="calificar-solicitud-id">
                <div class="form-group">
                    <label>Puntuación (1-5):</label>
                    <select id="puntuacion" required>
                        <option value="5">5 - Excelente</option>
                        <option value="4">4 - Bueno</option>
                        <option value="3">3 - Regular</option>
                        <option value="2">2 - Malo</option>
                        <option value="1">1 - Pésimo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comentario">Comentario (opcional):</label>
                    <textarea id="comentario" rows="3"></textarea>
                </div>
                <button type="submit" class="btn">Enviar calificación</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
</body>
</html>

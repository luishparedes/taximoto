<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TAXIMOTO - Solicitar viaje</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase/config.js"></script>
    <script src="js/taximoto.js"></script>
</head>
<body>
    <div class="app-header">
        <h1>🚖 TAXIMOTO</h1>
        <p>Solicitar viaje</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
            <button onclick="logout()" class="btn btn-small btn-secondary">Cerrar sesión</button>
        </div>
    </div>
    
    <div class="container">
        <!-- Formulario de solicitud -->
        <div class="card">
            <h3>Solicita tu viaje</h3>
            <form id="solicitar-form">
                <div class="form-group">
                    <label>Tipo de vehículo</label>
                    <select id="tipo" required>
                        <option value="taxi">🚕 Taxi</option>
                        <option value="mototaxi">🛵 Mototaxi</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📍 ¿Dónde estás?</label>
                    <input type="text" id="origen" required 
                           placeholder="Dirección de recogida"
                           autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🎯 ¿A dónde vas?</label>
                    <input type="text" id="destino" required 
                           placeholder="Dirección de destino"
                           autocomplete="off">
                </div>
                
                <button type="submit" class="btn btn-primary btn-large">Solicitar viaje</button>
            </form>
        </div>
        
        <!-- Estado del viaje (se actualiza en tiempo real) -->
        <div id="estado-viaje"></div>
        
        <!-- Contenedor para calificación -->
        <div id="calificacion-container"></div>
        
        <!-- Aviso legal -->
        <div class="legal-notice">
            TAXIMOTO solo conecta conductores con usuarios. No se hace responsable por pagos, accidentes, daños o conflictos.
        </div>
    </div>

    <script>
        // Asegurar que el formulario tenga el event listener
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('solicitar-form');
            if (form) {
                form.addEventListener('submit', window.solicitarViaje);
            }
        });
    </script>
</body>
</html>

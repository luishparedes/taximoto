<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Servicio - TaxiMoto2026</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2 class="logo">Solicitar Servicio</h2>
        <form id="requestForm">
            <input type="hidden" id="tipoServicio" value="">
            <div class="form-group">
                <label for="origen">Origen</label>
                <input type="text" id="origen" placeholder="Ej: Av. Principal, esquina..." required>
            </div>
            <div class="form-group">
                <label for="destino">Destino</label>
                <input type="text" id="destino" placeholder="Ej: Centro comercial..." required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Enviar Solicitud</button>
        </form>
        <div id="estadoSolicitud" style="margin-top:20px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/taximoto.js"></script>
    <script>
        // Leer parámetro tipo de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const tipo = urlParams.get('tipo');
        if(tipo) document.getElementById('tipoServicio').value = tipo;
    </script>
</body>
</html>

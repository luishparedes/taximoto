<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAXIMOTO - Configurar Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase/config.js"></script>
</head>
<body>
    <div class="app-header">
        <h1>🚖 TAXIMOTO</h1>
        <p>Configuración de administrador</p>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>Crear administrador único</h2>
            <p style="color: var(--accent-green); margin-bottom: 20px;">Email: admin@taximoto.com</p>
            
            <form onsubmit="crearAdmin(event)">
                <div class="form-group">
                    <label>Nombre del administrador</label>
                    <input type="text" id="nombre" required value="Administrador">
                </div>
                
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" required placeholder="04121234567">
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary">Crear administrador</button>
            </form>
            
            <div id="mensaje" class="success-message" style="display: none;"></div>
        </div>
        
        <div class="legal-notice">
            TAXIMOTO solo conecta conductores con usuarios. No se hace responsable por pagos, accidentes, daños o conflictos.
        </div>
    </div>
    
    <script>
        async function crearAdmin(event) {
            event.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            
            try {
                // Crear usuario en Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: 'admin@taximoto.com',
                    password: password,
                    phone: telefono
                });
                
                if (authError) throw authError;
                
                // Crear usuario en la tabla
                const { error: dbError } = await supabase
                    .from('usuarios')
                    .insert({
                        auth_id: authData.user.id,
                        nombre: nombre,
                        telefono: telefono,
                        rol: 'admin',
                        activo: true
                    });
                    
                if (dbError) throw dbError;
                
                document.getElementById('mensaje').style.display = 'block';
                document.getElementById('mensaje').textContent = 'Administrador creado exitosamente. Ya puedes iniciar sesión.';
                document.getElementById('mensaje').className = 'success-message';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                console.error(error);
                document.getElementById('mensaje').style.display = 'block';
                document.getElementById('mensaje').textContent = 'Error: ' + error.message;
                document.getElementById('mensaje').className = 'error-message';
            }
        }
    </script>
</body>
</html>
